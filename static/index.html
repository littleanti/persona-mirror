<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>페르소나 분석기</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --primary-bg: #eef2ff;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 4px 12px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.06);
      --radius: 16px;
      --radius-sm: 10px;
      --nav-h: 72px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, 'Pretendard', 'Noto Sans KR', BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .header-logo {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background .3s; }
    .status-dot.online { background: var(--success); }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      box-shadow: 0 -4px 20px rgba(0,0,0,.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 10px 0;
      cursor: pointer; transition: all .2s; border: none; background: none;
      color: var(--text-muted); font-size: 11px; font-weight: 500;
    }
    .nav-item svg { transition: all .2s; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active svg { transform: scale(1.1); }
    .nav-icon { width: 24px; height: 24px; position: relative; }
    .nav-badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--primary); color: white;
      font-size: 10px; font-weight: 700;
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Page Layout ── */
    .pages { overflow: hidden; }
    .page {
      display: none;
      padding: 16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);
      min-height: 100dvh;
      animation: fadeIn .2s ease;
    }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Cards ── */
    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    }
    .card-body { padding: 16px; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 60px 24px;
    }
    .empty-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--primary-bg); margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; border: none; transition: all .2s; letter-spacing: -.2px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--primary-bg); color: var(--primary); }
    .btn-danger { background: #fef2f2; color: var(--danger); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-full { width: 100%; }
    .btn-lg { padding: 15px 24px; font-size: 16px; border-radius: 14px; }
    .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }

    /* ── FAB ── */
    .fab {
      position: fixed; right: 20px;
      bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(99,102,241,.4);
      transition: all .2s; z-index: 90;
      font-size: 24px; font-weight: 300;
    }
    .fab:active { transform: scale(.93); }
    .fab-hidden { display: none !important; }

    /* ── Persona List ── */
    .persona-list { display: flex; flex-direction: column; gap: 12px; }
    .persona-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      padding: 16px; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: 14px;
    }
    .persona-card:active { transform: scale(.98); box-shadow: none; }
    .persona-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .persona-info { flex: 1; min-width: 0; }
    .persona-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .persona-summary {
      font-size: 13px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .persona-date { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .persona-arrow { color: var(--text-muted); flex-shrink: 0; }

    /* ── Section Title ── */
    .section-title {
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .5px;
      margin: 20px 0 10px;
    }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 14px; font-weight: 600;
      color: var(--text); margin-bottom: 8px;
    }
    .form-label span { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    .form-input, .form-textarea {
      width: 100%; padding: 13px 15px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; font-family: inherit; color: var(--text);
      background: var(--bg); transition: border-color .2s;
      outline: none; resize: none; line-height: 1.5;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--primary); background: white; }
    .form-textarea { min-height: 160px; }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

    /* ── Sheet (Slide-up modal) ── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.4); opacity: 0;
      transition: opacity .3s; pointer-events: none;
      backdrop-filter: blur(4px);
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--card); border-radius: 24px 24px 0 0;
      max-height: 92dvh; overflow-y: auto;
      transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
      padding-bottom: var(--safe-bottom);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 12px auto 0; flex-shrink: 0;
    }
    .sheet-header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .sheet-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 18px;
    }
    .sheet-body { padding: 20px; }

    /* ── Detail Sheet ── */
    .detail-hero {
      text-align: center; padding: 24px 20px 20px;
    }
    .detail-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 700; color: white;
      margin: 0 auto 12px;
    }
    .detail-name { font-size: 22px; font-weight: 800; }
    .detail-date { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .persona-tag-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .persona-tag {
      background: var(--bg); border-radius: var(--radius-sm);
      border: 1px solid var(--border); padding: 12px 14px;
    }
    .persona-tag-label {
      font-size: 11px; font-weight: 600; color: var(--primary);
      text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px;
    }
    .persona-tag-value { font-size: 14px; color: var(--text); line-height: 1.5; }

    /* ── Persona Selector ── */
    .persona-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .persona-selector::-webkit-scrollbar { display: none; }
    .persona-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--card);
      cursor: pointer; transition: all .2s; white-space: nowrap;
      font-size: 14px; font-weight: 500; color: var(--text-secondary);
      flex-shrink: 0;
    }
    .persona-chip.selected {
      border-color: var(--primary); background: var(--primary-bg);
      color: var(--primary); font-weight: 600;
    }
    .chip-avatar {
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }

    /* ── Analysis Results ── */
    .analysis-box {
      background: linear-gradient(135deg, #f0f3ff, #e8ecff);
      border: 1.5px solid #c7d0ff;
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
    }
    .analysis-box-label {
      font-size: 12px; font-weight: 700; color: var(--primary);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .analysis-box-text { font-size: 14px; line-height: 1.7; color: var(--text); }

    .candidate-list { display: flex; flex-direction: column; gap: 12px; }
    .candidate-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      overflow: hidden; transition: box-shadow .2s;
    }
    .candidate-header {
      padding: 12px 14px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .candidate-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .candidate-label { font-size: 14px; font-weight: 700; flex: 1; }
    .candidate-body { padding: 12px 14px; }
    .candidate-reason {
      font-size: 12px; color: var(--text-secondary); line-height: 1.6;
      margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px dashed var(--border);
    }
    .candidate-reason strong { color: var(--text); }
    .candidate-response {
      font-size: 15px; line-height: 1.65; color: var(--text);
      font-weight: 500;
    }
    .candidate-copy {
      width: 100%; margin-top: 12px; padding: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; color: var(--text-secondary);
      font-size: 13px; font-weight: 500; display: flex; align-items: center;
      justify-content: center; gap: 6px; transition: all .2s;
    }
    .candidate-copy:active { background: var(--primary-bg); color: var(--primary); }
    .candidate-copy.copied { background: #f0fdf4; color: var(--success); border-color: #86efac; }

    /* ── Loading ── */
    .loading-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(248,250,252,.85); backdrop-filter: blur(8px);
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 4px solid var(--primary-bg);
      border-top-color: var(--primary);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; font-weight: 600; color: var(--text); }
    .loading-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Inline loading ── */
    .inline-spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white; animation: spin .7s linear infinite;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 60px);
      pointer-events: none; width: 100%; max-width: 380px; padding-left: 16px; padding-right: 16px;
    }
    .toast {
      background: #1e293b; color: white; border-radius: 12px;
      padding: 12px 16px; font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow-lg); animation: toastIn .3s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .toast.error { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* ── Misc ── */
    .text-sm { font-size: 13px; }
    .text-muted { color: var(--text-muted); }
    .mt-4 { margin-top: 16px; }
    .no-persona-hint {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 12px; padding: 14px 16px;
      font-size: 13px; color: #92400e; display: flex; gap: 10px; align-items: flex-start;
    }

    /* ── Conversation preview toggle ── */
    .conv-preview {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .conv-preview-toggle {
      width: 100%; padding: 12px 14px; background: none; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 600; color: var(--text-secondary);
    }
    .conv-preview-body { padding: 0 14px 12px; display: none; }
    .conv-preview-body.open { display: block; }
    .conv-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }

    /* ── Persona Tabs ── */
    .persona-tabs {
      display: flex; gap: 6px; margin: 0 0 14px;
      background: var(--bg); border-radius: 12px; padding: 4px;
    }
    .persona-tab {
      flex: 1; padding: 9px 12px; border-radius: 9px;
      border: none; background: transparent; cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
      transition: all .2s; text-align: center;
    }
    .persona-tab.active {
      background: var(--card); color: var(--primary);
      box-shadow: var(--shadow-sm);
    }
    .persona-tab-pane { display: none; }
    .persona-tab-pane.active { display: block; }
    .my-persona-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; color: var(--success);
      background: #f0fdf4; border: 1px solid #86efac;
      padding: 3px 8px; border-radius: 20px; margin-top: 6px;
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-logo">🧠</div>
  <h1>페르소나 분석기</h1>
  <div class="header-sub">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">연결 확인 중</span>
  </div>
</header>

<!-- Pages -->
<div class="pages">

  <!-- ── PAGE: 페르소나 ── -->
  <div class="page active" id="page-personas">
    <div id="personaListContainer">
      <div class="empty-state" id="emptyPersonas">
        <div class="empty-icon">👤</div>
        <h3>저장된 페르소나 없음</h3>
        <p>대화 기록을 입력하면<br>AI가 상대방의 페르소나를 분석해요</p>
        <button class="btn btn-primary btn-lg" onclick="openCreateSheet()">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          새 페르소나 만들기
        </button>
      </div>
      <div class="persona-list" id="personaList" style="display:none"></div>
    </div>
  </div>

  <!-- ── PAGE: 분석하기 ── -->
  <div class="page" id="page-analyze">
    <div class="no-persona-hint" id="noPersonaHint" style="display:none">
      <span>⚠️</span>
      <span>먼저 <strong>페르소나 탭</strong>에서 상대방의 대화를 분석해 페르소나를 만들어주세요.</span>
    </div>

    <p class="section-title">페르소나 선택</p>
    <div class="persona-selector" id="personaSelector">
      <div class="text-sm text-muted" style="padding:8px 4px">불러오는 중...</div>
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label class="form-label">
        받은 메시지 입력
        <span>— 상대방이 보낸 메시지를 입력하세요</span>
      </label>
      <textarea
        class="form-textarea"
        id="messageInput"
        placeholder="예) 야 오늘 뭐해? 시간 돼?"
        rows="4"
      ></textarea>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="analyzeBtn" onclick="analyzeMessage()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      분석하기
    </button>

    <div id="analyzeResults" style="display:none">
      <div class="divider"></div>
      <div class="analysis-box" id="analysisBox">
        <div class="analysis-box-label">
          <span>🔍</span> AI 심리 분석
        </div>
        <p class="analysis-box-text" id="analysisText"></p>
      </div>
      <p class="section-title">원하는 답변 후보 3가지</p>
      <div class="candidate-list" id="candidateList"></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openCreateSheet()" title="새 페르소나">
  <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-personas" onclick="switchPage('personas')">
    <div class="nav-icon">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span class="nav-badge" id="personaBadge" style="display:none">0</span>
    </div>
    페르소나
  </button>
  <button class="nav-item" id="nav-analyze" onclick="switchPage('analyze')">
    <div class="nav-icon">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
    </div>
    분석하기
  </button>
</nav>

<!-- ── Sheet: 페르소나 생성 ── -->
<div class="sheet-overlay" id="createOverlay" onclick="closeCreateSheet()"></div>
<div class="sheet" id="createSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">새 페르소나 만들기</span>
    <button class="sheet-close" onclick="closeCreateSheet()">✕</button>
  </div>
  <div class="sheet-body">
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1;">
        <label class="form-label">상대방 이름 <span>* 필수</span></label>
        <input class="form-input" id="personaName" placeholder="예) 김민준" />
      </div>
      <div class="form-group" style="flex:1;">
        <label class="form-label">나의 이름 <span>선택</span></label>
        <input class="form-input" id="myName" placeholder="예) 나" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">
        대화 기록 붙여넣기
        <span>* 카카오톡, 문자 등 대화 내용</span>
      </label>
      <textarea
        class="form-textarea"
        id="conversationInput"
        placeholder="김민준: 야 오늘 뭐해?&#10;나: 집에 있어. 왜?&#10;김민준: 아 그냥... 오늘 약속 있나 해서&#10;나: 없는데 왜?&#10;..."
        style="min-height: 200px;"
      ></textarea>
      <p class="form-hint">📋 대화가 많을수록 더 정확한 페르소나가 만들어져요. 최소 10줄 이상 권장합니다.</p>
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="createBtn" onclick="createPersona()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      페르소나 생성
    </button>
  </div>
</div>

<!-- ── Sheet: 페르소나 상세 ── -->
<div class="sheet-overlay" id="detailOverlay" onclick="closeDetailSheet()"></div>
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">페르소나 상세</span>
    <button class="sheet-close" onclick="closeDetailSheet()">✕</button>
  </div>
  <div class="sheet-body" id="detailBody"></div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">AI 분석 중...</div>
  <div class="loading-sub" id="loadingSub">gemma4가 열심히 생각하고 있어요 ☕</div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ── State ──
  let personas = [];
  let selectedPersonaId = null;
  let currentDetailId = null;
  let currentDetailData = null;
  let currentCandidates = [];

  // ── Helpers ──
  function showLoading(text = 'AI 분석 중...', sub = 'gemma4가 열심히 생각하고 있어요 ☕') {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingSub').textContent = sub;
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('show');
  }

  function showToast(msg, type = '') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = (type === 'success' ? '✓ ' : type === 'error' ? '✕ ' : 'ℹ ') + msg;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function getInitial(name) {
    return name ? name[0].toUpperCase() : '?';
  }

  // ── Navigation ──
  function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    document.getElementById(`nav-${page}`).classList.add('active');

    const fab = document.getElementById('fab');
    if (page === 'personas') {
      fab.classList.remove('fab-hidden');
      loadPersonaSelector();
    } else {
      fab.classList.add('fab-hidden');
      loadPersonaSelector();
    }
  }

  // ── Persona CRUD ──
  async function loadPersonas() {
    try {
      const res = await fetch('/api/personas');
      personas = await res.json();
      renderPersonaList();
      renderPersonaSelector();
      updateBadge();
    } catch (e) {
      showToast('페르소나를 불러오지 못했습니다', 'error');
    }
  }

  function updateBadge() {
    const badge = document.getElementById('personaBadge');
    if (personas.length > 0) {
      badge.style.display = 'flex';
      badge.textContent = personas.length;
    } else {
      badge.style.display = 'none';
    }
  }

  function renderPersonaList() {
    const empty = document.getElementById('emptyPersonas');
    const list = document.getElementById('personaList');
    if (personas.length === 0) {
      empty.style.display = '';
      list.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    list.style.display = 'flex';
    list.innerHTML = personas.map(p => `
      <div class="persona-card" onclick="openDetailSheet('${p.id}')">
        <div class="persona-avatar">${getInitial(p.name)}</div>
        <div class="persona-info">
          <div class="persona-name">
            ${escHtml(p.name)}
            ${p.my_name ? `<span style="font-size:12px;font-weight:500;color:var(--primary);background:var(--primary-bg);padding:2px 7px;border-radius:20px;margin-left:6px;">나: ${escHtml(p.my_name)}</span>` : ''}
          </div>
          <div class="persona-summary">${escHtml(p.summary || '페르소나 분석 완료')}</div>
          <div class="persona-date">${formatDate(p.created_at)}</div>
        </div>
        <div class="persona-arrow">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </div>
      </div>
    `).join('');
  }

  function renderPersonaSelector() {
    const sel = document.getElementById('personaSelector');
    const hint = document.getElementById('noPersonaHint');
    if (personas.length === 0) {
      sel.innerHTML = '';
      hint.style.display = 'flex';
      return;
    }
    hint.style.display = 'none';
    sel.innerHTML = personas.map(p => `
      <div class="persona-chip ${selectedPersonaId === p.id ? 'selected' : ''}"
           onclick="selectPersona('${p.id}')">
        <div class="chip-avatar">${getInitial(p.name)}</div>
        ${escHtml(p.name)}${p.my_name ? ` <span style="opacity:.6;font-size:12px;">/ 나: ${escHtml(p.my_name)}</span>` : ''}
      </div>
    `).join('');
  }

  function loadPersonaSelector() {
    renderPersonaSelector();
  }

  function selectPersona(id) {
    selectedPersonaId = id;
    renderPersonaSelector();
  }

  async function createPersona() {
    const name = document.getElementById('personaName').value.trim();
    const myName = document.getElementById('myName').value.trim();
    const conversation = document.getElementById('conversationInput').value.trim();
    if (!name) { showToast('이름을 입력해주세요', 'error'); return; }
    if (conversation.length < 20) { showToast('대화 기록이 너무 짧아요', 'error'); return; }

    closeCreateSheet();
    const loadingSub = myName
      ? `${name}과 ${myName}의 페르소나를 동시에 분석하고 있어요`
      : `${name}의 대화를 분석하고 있어요`;
    showLoading('페르소나 생성 중...', loadingSub);

    try {
      const res = await fetch('/api/personas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, my_name: myName, conversation })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      showToast(`${name} 페르소나 생성 완료!`, 'success');
      document.getElementById('personaName').value = '';
      document.getElementById('myName').value = '';
      document.getElementById('conversationInput').value = '';
      await loadPersonas();
    } catch (e) {
      showToast('페르소나 생성에 실패했습니다', 'error');
    } finally {
      hideLoading();
    }
  }

  async function openDetailSheet(id) {
    currentDetailId = id;
    currentDetailData = null;
    showLoading('불러오는 중...', '');
    try {
      const res = await fetch(`/api/personas/${id}`);
      const data = await res.json();
      currentDetailData = data;
      renderDetail(data);
      hideLoading();
      document.getElementById('detailOverlay').classList.add('open');
      document.getElementById('detailSheet').classList.add('open');
    } catch (e) {
      hideLoading();
      showToast('상세 정보를 불러오지 못했습니다', 'error');
    }
  }

  function buildPersonaFields(obj) {
    const FIELD_LABELS = [
      ['summary', '요약', false],
      ['communication_style', '소통 방식', false],
      ['speech_level', '경어/어미 패턴', false],
      ['vocabulary_examples', '자주 쓰는 표현', true],   // array
      ['sentence_style', '문장 스타일', false],
      ['emoji_symbol_usage', '이모지/특수문자', false],
      ['emotional_tendencies', '감정 표현', false],
      ['what_they_value', '중요 가치', false],
      ['how_they_seek_response', '원하는 반응', false],
      ['relationship_dynamics', '관계 역학', false],
    ];
    return FIELD_LABELS
      .filter(([k]) => obj[k] && (Array.isArray(obj[k]) ? obj[k].length > 0 : true))
      .map(([k, label, isArray]) => {
        const val = isArray && Array.isArray(obj[k])
          ? obj[k].map(v => `<span style="display:inline-block;background:var(--primary-bg);color:var(--primary);border-radius:6px;padding:2px 8px;margin:2px;font-size:13px;">${escHtml(String(v))}</span>`).join('')
          : `<span>${escHtml(String(obj[k]))}</span>`;
        return `
          <div class="persona-tag">
            <div class="persona-tag-label">${label}</div>
            <div class="persona-tag-value" style="${isArray ? 'display:flex;flex-wrap:wrap;gap:2px;' : ''}">${val}</div>
          </div>
        `;
      }).join('');
  }

  function renderDetail(data) {
    const hasDual = data.my_name && Object.keys(data.my_persona || {}).length > 0;

    const tabsHtml = hasDual ? `
      <div class="persona-tabs">
        <button class="persona-tab active" id="tab-other" onclick="switchDetailTab('other')">
          👤 ${escHtml(data.name)}
        </button>
        <button class="persona-tab" id="tab-me" onclick="switchDetailTab('me')">
          🙋 나 (${escHtml(data.my_name)})
        </button>
      </div>
    ` : '';

    const otherFields = buildPersonaFields(data.persona || {});
    const myFields = hasDual ? buildPersonaFields(data.my_persona || {}) : '';

    const personaHtml = hasDual ? `
      ${tabsHtml}
      <div class="persona-tab-pane active" id="pane-other">
        <div class="persona-tag-grid">${otherFields}</div>
      </div>
      <div class="persona-tab-pane" id="pane-me">
        <div class="my-persona-badge">✦ ${escHtml(data.my_name)}와 ${escHtml(data.name)}의 관계에서의 나</div>
        <div class="persona-tag-grid" style="margin-top:10px;">${myFields}</div>
      </div>
    ` : `<div class="persona-tag-grid">${otherFields}</div>`;

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-hero">
        <div class="detail-avatar">${getInitial(data.name)}</div>
        <div class="detail-name">${escHtml(data.name)}</div>
        ${hasDual ? `<div class="my-persona-badge" style="margin:6px auto 0;">나: ${escHtml(data.my_name)}</div>` : ''}
        <div class="detail-date" style="margin-top:6px;">생성일 ${formatDate(data.created_at)}</div>
      </div>
      ${personaHtml}
      <div class="conv-preview">
        <button class="conv-preview-toggle" onclick="toggleConvPreview(this)">
          <span>📝 원본 대화 기록 보기</span>
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="conv-preview-body">
          <pre class="conv-text">${escHtml(data.conversation || '')}</pre>
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:10px;align-items:stretch;">
        <button class="btn btn-secondary" style="flex:1;" onclick="usePersonaForAnalysis()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          이 페르소나로 분석
        </button>
        <button class="btn btn-danger" style="flex-shrink:0;white-space:nowrap;" onclick="deletePersona()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          삭제
        </button>
      </div>
    `;
  }

  function switchDetailTab(which) {
    document.getElementById('pane-other').classList.toggle('active', which === 'other');
    document.getElementById('pane-me').classList.toggle('active', which === 'me');
    document.getElementById('tab-other').classList.toggle('active', which === 'other');
    document.getElementById('tab-me').classList.toggle('active', which === 'me');
  }

  function toggleConvPreview(btn) {
    const body = btn.nextElementSibling;
    body.classList.toggle('open');
  }

  function usePersonaForAnalysis() {
    if (!currentDetailData) return;
    selectedPersonaId = currentDetailData.id;
    closeDetailSheet();
    switchPage('analyze');
    renderPersonaSelector();
    showToast(`${currentDetailData.name} 페르소나 선택됨`, 'success');
  }

  async function deletePersona() {
    if (!currentDetailData) return;
    const { id, name } = currentDetailData;
    if (!confirm(`"${name}" 페르소나를 삭제할까요?`)) return;
    try {
      await fetch(`/api/personas/${id}`, { method: 'DELETE' });
      closeDetailSheet();
      if (selectedPersonaId === id) selectedPersonaId = null;
      await loadPersonas();
      showToast(`${name} 삭제 완료`, 'success');
    } catch (e) {
      showToast('삭제에 실패했습니다', 'error');
    }
  }

  function closeDetailSheet() {
    document.getElementById('detailOverlay').classList.remove('open');
    document.getElementById('detailSheet').classList.remove('open');
  }

  // ── Create Sheet ──
  function openCreateSheet() {
    document.getElementById('createOverlay').classList.add('open');
    document.getElementById('createSheet').classList.add('open');
    setTimeout(() => document.getElementById('personaName').focus(), 350);
  }
  function closeCreateSheet() {
    document.getElementById('createOverlay').classList.remove('open');
    document.getElementById('createSheet').classList.remove('open');
  }

  // ── Analysis ──
  async function analyzeMessage() {
    if (!selectedPersonaId) {
      showToast('페르소나를 선택해주세요', 'error'); return;
    }
    const message = document.getElementById('messageInput').value.trim();
    if (!message) { showToast('메시지를 입력해주세요', 'error'); return; }

    const persona = personas.find(p => p.id === selectedPersonaId);
    showLoading('메시지 분석 중...', `${persona?.name || ''}의 심리를 파악하고 있어요 🔍`);

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ persona_id: selectedPersonaId, message })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderResults(data);
      hideLoading();
      // 결과로 스크롤
      setTimeout(() => {
        document.getElementById('analyzeResults').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    } catch (e) {
      hideLoading();
      showToast('분석에 실패했습니다. Ollama 연결을 확인해주세요', 'error');
    }
  }

  function renderResults(data) {
    currentCandidates = data.candidates || [];
    const results = document.getElementById('analyzeResults');
    document.getElementById('analysisText').textContent = data.analysis || '';
    document.getElementById('candidateList').innerHTML = currentCandidates.map((c, i) => `
      <div class="candidate-card">
        <div class="candidate-header">
          <div class="candidate-num">${i + 1}</div>
          <div class="candidate-label">${escHtml(c.label || `후보 ${i+1}`)}</div>
        </div>
        <div class="candidate-body">
          <div class="candidate-reason">
            <strong>원하는 이유:</strong> ${escHtml(c.reason || '')}
          </div>
          <div class="candidate-response">${escHtml(c.response || '')}</div>
          <button class="candidate-copy" onclick="copyResponse(this, ${i})">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            복사하기
          </button>
        </div>
      </div>
    `).join('');
    results.style.display = 'block';
  }

  async function copyResponse(btn, idx) {
    const text = (currentCandidates[idx] || {}).response || '';
    try {
      await navigator.clipboard.writeText(text);
      btn.classList.add('copied');
      btn.innerHTML = '✓ 복사됨';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 복사하기`;
      }, 2000);
    } catch {
      showToast('클립보드 복사 실패', 'error');
    }
  }

  // ── Health Check ──
  async function checkHealth() {
    try {
      const res = await fetch('/api/health');
      const data = await res.json();
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (data.ollama === 'connected') {
        dot.classList.add('online');
        text.textContent = 'Ollama 연결됨';
      } else {
        dot.classList.remove('online');
        text.textContent = 'Ollama 오프라인';
      }
    } catch {
      document.getElementById('statusText').textContent = '서버 오프라인';
    }
  }

  // ── Util ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Enter to analyze ──
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.metaKey) {
      const activePage = document.querySelector('.page.active');
      if (activePage && activePage.id === 'page-analyze') analyzeMessage();
    }
  });

  // ── Init ──
  checkHealth();
  loadPersonas();
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
